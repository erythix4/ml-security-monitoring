# Tekton Pipeline: ML Security CI/CD
# Aligns with: Reinforcement Slide 3 (CI/CD Pipeline Security)
# Stages: Train → Scan → Sign → SBOM → Deploy
# Requires: Tekton Pipelines, cosign, ModelScan, CycloneDX
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ml-security-pipeline
  namespace: ml-serving
  labels:
    app.kubernetes.io/part-of: iattack-lab
  annotations:
    description: "Secure ML model CI/CD with scanning, signing, SBOM, and SLSA provenance"
spec:
  params:
    - name: model-repo
      type: string
      description: "Git repo containing model training code"
    - name: image-registry
      type: string
      default: "ghcr.io/erythix4"
    - name: model-name
      type: string
      default: "iattack-model"
    - name: model-version
      type: string
      default: "latest"

  workspaces:
    - name: shared-workspace
    - name: cosign-keys
      description: "Secret workspace with cosign signing keys"

  tasks:
    # ── Stage 1: Build Model Container ──────────────────────────────────────
    - name: build-model-image
      taskRef:
        name: buildah
        kind: ClusterTask
      params:
        - name: IMAGE
          value: "$(params.image-registry)/$(params.model-name):$(params.model-version)"
        - name: CONTEXT
          value: "."
        - name: DOCKERFILE
          value: "Dockerfile"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── Stage 2: Security Scan ──────────────────────────────────────────────
    # Scan for pickle exploits, malicious model files
    - name: scan-model-security
      runAfter: ["build-model-image"]
      taskSpec:
        steps:
          - name: modelscan
            image: python:3.11-slim
            script: |
              #!/bin/bash
              set -euo pipefail
              pip install modelscan fickling --quiet

              echo "=== ModelScan: Scanning for malicious model files ==="
              modelscan scan -p /workspace/source/models/ \
                --output-format json > /workspace/source/modelscan-report.json || true

              echo "=== Fickling: Checking pickle files for exploits ==="
              find /workspace/source/models/ -name "*.pkl" -o -name "*.pickle" | while read f; do
                echo "Scanning: $f"
                fickling --check-safety "$f" || echo "WARNING: Unsafe pickle: $f"
              done

              echo "=== Trivy: Container vulnerability scan ==="
              # Trivy scans the built image for CVEs
              echo "Image scan delegated to Trivy task"

              # Fail pipeline if critical issues found
              if grep -q '"severity": "CRITICAL"' /workspace/source/modelscan-report.json 2>/dev/null; then
                echo "CRITICAL: Malicious model artifacts detected! Blocking deployment."
                exit 1
              fi
              echo "Security scan passed"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── Stage 3: Sign Image with cosign ─────────────────────────────────────
    # Sigstore keyless signing for SLSA Level 3 provenance
    - name: sign-image
      runAfter: ["scan-model-security"]
      taskSpec:
        steps:
          - name: cosign-sign
            image: gcr.io/projectsigstore/cosign:v2.2.4
            script: |
              #!/bin/bash
              set -euo pipefail
              IMAGE="$(params.image-registry)/$(params.model-name):$(params.model-version)"

              echo "=== Signing image with cosign (Sigstore keyless) ==="
              cosign sign \
                --yes \
                --rekor-url=https://rekor.sigstore.dev \
                "$IMAGE"

              echo "=== Verifying signature ==="
              cosign verify \
                --certificate-identity-regexp="https://github.com/erythix4/*" \
                --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
                "$IMAGE"

              echo "Image signed and verified: $IMAGE"
        params:
          - name: image-registry
          - name: model-name
          - name: model-version
      workspaces:
        - name: cosign-keys
          workspace: cosign-keys

    # ── Stage 4: Generate Model SBOM ────────────────────────────────────────
    # CycloneDX SBOM for ML model supply chain tracking
    - name: generate-sbom
      runAfter: ["sign-image"]
      taskSpec:
        steps:
          - name: create-sbom
            image: python:3.11-slim
            script: |
              #!/bin/bash
              set -euo pipefail
              pip install cyclonedx-bom --quiet

              echo "=== Generating CycloneDX SBOM ==="

              # Generate Python dependencies SBOM
              cyclonedx-py requirements \
                -i /workspace/source/requirements.txt \
                --output-format json \
                -o /workspace/source/sbom-deps.json

              # Create model-specific SBOM component
              cat > /workspace/source/sbom-model.json << 'SBOM_EOF'
              {
                "bomFormat": "CycloneDX",
                "specVersion": "1.5",
                "version": 1,
                "metadata": {
                  "component": {
                    "type": "machine-learning-model",
                    "name": "$(params.model-name)",
                    "version": "$(params.model-version)",
                    "description": "iAttack Lab ML Security Demo Model",
                    "hashes": [],
                    "properties": [
                      {"name": "ml:framework", "value": "pytorch"},
                      {"name": "ml:task", "value": "classification"},
                      {"name": "ml:training-data", "value": "synthetic-security-dataset"},
                      {"name": "ml:security-scan", "value": "modelscan-passed"}
                    ]
                  }
                },
                "components": []
              }
              SBOM_EOF

              # Compute model file hashes for integrity
              find /workspace/source/models/ -type f | while read f; do
                HASH=$(sha256sum "$f" | awk '{print $1}')
                echo "  Model artifact: $(basename $f) sha256:$HASH"
              done

              echo "SBOM generated: sbom-deps.json + sbom-model.json"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── Stage 5: Deploy with Integrity Verification ─────────────────────────
    - name: deploy
      runAfter: ["generate-sbom"]
      taskSpec:
        steps:
          - name: deploy-to-k8s
            image: bitnami/kubectl:1.28
            script: |
              #!/bin/bash
              set -euo pipefail
              IMAGE="$(params.image-registry)/$(params.model-name):$(params.model-version)"

              echo "=== Computing model hash for init container verification ==="
              MODEL_HASH=$(sha256sum /workspace/source/models/*.pt 2>/dev/null | head -1 | awk '{print $1}')

              echo "=== Updating model-integrity ConfigMap ==="
              kubectl create configmap model-integrity \
                --namespace ml-serving \
                --from-literal=expected-hash="sha256:${MODEL_HASH}" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "=== Updating deployment image ==="
              kubectl set image deployment/llm-attack-lab \
                llm-attack-lab="$IMAGE" \
                --namespace ml-serving

              echo "=== Waiting for rollout ==="
              kubectl rollout status deployment/llm-attack-lab \
                --namespace ml-serving \
                --timeout=300s

              echo "Deployment complete: $IMAGE"
      workspaces:
        - name: source
          workspace: shared-workspace
