# Monitoring Stack - Kubernetes Deployment
# Aligns with: Slide 13 (CNCF Stack), Slide 15 (OTel Architecture), Slide 16 (K8s-Native Deploy)
# Components: VictoriaMetrics, vmalert, OTel Collector, Grafana
# For production: use Helm charts (see docs/K8S_DEPLOYMENT.md)
---
# ── VictoriaMetrics Single-Node ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: monitoring
  labels:
    app: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.96.0
          args:
            - "--storageDataPath=/storage"
            - "--httpListenAddr=:8428"
            - "--retentionPeriod=30d"
            - "--selfScrapeInterval=10s"
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: storage
              mountPath: /storage
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victoriametrics-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  selector:
    app: victoriametrics
  ports:
    - port: 8428
      targetPort: 8428
---
# ── vmalert with ML Security Rules ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: monitoring
  labels:
    app: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmalert
  template:
    metadata:
      labels:
        app: vmalert
    spec:
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.96.0
          args:
            - "--datasource.url=http://victoriametrics:8428"
            - "--remoteRead.url=http://victoriametrics:8428"
            - "--remoteWrite.url=http://victoriametrics:8428"
            - "--notifier.url=http://grafana:3000"
            - "--rule=/etc/vmalert/rules/*.yaml"
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert/rules
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: rules
          configMap:
            name: vmalert-rules
---
# ── OTel Collector DaemonSet ─────────────────────────────────────────────────
# Slide 15: OTel Collector as universal telemetry backbone
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.91.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317    # OTLP gRPC
            - containerPort: 4318    # OTLP HTTP
            - containerPort: 8888    # Self metrics
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# ── Grafana ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
          volumeMounts:
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: provisioning
              mountPath: /etc/grafana/provisioning
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
# ── DCGM Exporter (GPU metrics) ─────────────────────────────────────────────
# Reinforcement Slide 5: GPU-Aware Observability
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      # Only schedule on GPU nodes
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.0-3.2.0-ubuntu22.04
          ports:
            - containerPort: 9400
              name: metrics
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
          securityContext:
            privileged: true
          volumeMounts:
            - name: dcgm-config
              mountPath: /etc/dcgm-exporter
      volumes:
        - name: dcgm-config
          configMap:
            name: dcgm-exporter-config
---
# DCGM Exporter Config - Security-focused metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-exporter-config
  namespace: monitoring
data:
  counters.csv: |
    # Security-relevant DCGM metrics (Reinforcement Slide 5)
    DCGM_FI_DEV_GPU_UTIL,     gauge, GPU utilization (%)
    DCGM_FI_DEV_FB_USED,      gauge, Framebuffer memory used (MB)
    DCGM_FI_DEV_FB_FREE,      gauge, Framebuffer memory free (MB)
    DCGM_FI_DEV_GPU_TEMP,     gauge, GPU temperature (°C)
    DCGM_FI_DEV_POWER_USAGE,  gauge, Power usage (W)
    DCGM_FI_DEV_ENC_UTIL,     gauge, Encoder utilization (% - should be 0 for ML)
    DCGM_FI_DEV_DEC_UTIL,     gauge, Decoder utilization (%)
    DCGM_FI_DEV_XID_ERRORS,   gauge, XID error count (driver issues)
    DCGM_FI_DEV_SM_CLOCK,     gauge, SM clock frequency
    DCGM_FI_DEV_MEM_CLOCK,    gauge, Memory clock frequency
